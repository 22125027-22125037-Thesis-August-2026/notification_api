services:
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: umatter-rabbitmq
    ports:
      - "5672:5672"     # AMQP (host 5672 -> container 5672, per uMatter unified port map)
      - "15672:15672"   # Management UI (host 15672 -> container 15672, per uMatter unified port map)
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: umatter-redis
    ports:
      - "6372:6379"
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  notification-postgres:
    image: postgres:16-alpine
    container_name: notification-postgres
    ports:
      # Host port 5432 -> container 5432, per uMatter unified port map.
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-notification}
      POSTGRES_USER: ${DB_USERNAME:-notification}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-notification}
    volumes:
      - notification-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-notification} -d ${DB_NAME:-notification}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  notification-pgadmin:
    image: dpage/pgadmin4
    container_name: notification-pgadmin
    ports:
      - "5052:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@umatter.app}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      # Disable master-password / server-mode prompts for local dev.
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - notification-pgadmin-data:/var/lib/pgadmin
    depends_on:
      notification-postgres:
        condition: service_healthy
    restart: unless-stopped

  notification-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: umatter-notification-service
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      notification-postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      RABBITMQ_HOST: rabbitmq
      REDIS_HOST: redis
      DB_URL: jdbc:postgresql://notification-postgres:5432/${DB_NAME:-notification}
      # Always bind to 8080 INSIDE the container. The host-side port is set
      # separately via the ports mapping below (driven by SERVER_PORT in .env).
      SERVER_PORT: "8080"
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "${SERVER_PORT:-8080}:8080"
    volumes:
      # Mount Firebase Admin SDK credentials read-only into the container.
      # Place your JSON at ./secrets/firebase-credentials.json on the host.
      - ./secrets:/app/secrets:ro
    restart: unless-stopped

volumes:
  rabbitmq-data:
  redis-data:
  notification-postgres-data:
  notification-pgadmin-data:
