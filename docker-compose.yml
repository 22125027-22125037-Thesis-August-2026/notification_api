services:
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: umatter-rabbitmq
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: umatter-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  notification-postgres:
    image: postgres:16-alpine
    container_name: notification-postgres
    ports:
      # Host port 5435 -> container 5432, to avoid collisions with Auth/Booking DBs.
      - "5435:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-notification}
      POSTGRES_USER: ${DB_USERNAME:-notification}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-notification}
    volumes:
      - notification-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-notification} -d ${DB_NAME:-notification}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  notification-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: umatter-notification-service
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      notification-postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      RABBITMQ_HOST: rabbitmq
      REDIS_HOST: redis
      DB_URL: jdbc:postgresql://notification-postgres:5432/${DB_NAME:-notification}
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "${SERVER_PORT:-8080}:8080"
    volumes:
      # Mount Firebase Admin SDK credentials read-only into the container.
      # Place your JSON at ./secrets/firebase-credentials.json on the host.
      - ./secrets:/app/secrets:ro
    restart: unless-stopped

volumes:
  rabbitmq-data:
  redis-data:
  notification-postgres-data:
