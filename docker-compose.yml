# Memory ceilings target an 8 GiB host shared with the other three stacks. JAVA_TOOL_OPTIONS
# uses MaxRAMPercentage rather than a literal -Xmx so the heap is derived from mem_limit (the
# JVM reads the cgroup) and the two cannot drift apart.
services:
  # NOTE: This service no longer runs its own RabbitMQ broker. Domain events are
  # published to / consumed from the shared Auth Service broker (host port 5671).
  redis:
    image: redis:7-alpine
    container_name: umatter-redis
    mem_limit: 128m
    networks:
      - notification-bridge
    ports:
      - "6372:6379"
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning", "--maxmemory", "64mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  notification-postgres:
    image: postgres:16-alpine
    container_name: notification-postgres
    mem_limit: 256m
    command: postgres -c shared_buffers=32MB -c max_connections=50
    networks:
      - notification-bridge
    ports:
      # Host port 5432 -> container 5432, per uMatter unified port map.
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-notification}
      POSTGRES_USER: ${DB_USERNAME:-notification}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-notification}
    volumes:
      - notification-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-notification} -d ${DB_NAME:-notification}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  notification-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: umatter-notification-service
    mem_limit: 640m
    networks:
      - notification-bridge
      - umatter-shared
    depends_on:
      redis:
        condition: service_healthy
      notification-postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=60 -XX:MaxMetaspaceSize=128m -XX:+UseSerialGC -Xss512k"
      # Shared Auth Service broker, reached via the host gateway + published port.
      RABBITMQ_HOST: host.docker.internal
      RABBITMQ_PORT: "5671"
      # Verification keys come from Auth's published key set, selected by kid, so a rotation
      # at Auth needs no redeploy here. auth-service resolves over the umatter-shared network.
      # (.env still carries JWT_PUBLIC_KEY; the decoder logs that it is ignoring it.)
      JWT_JWKS_URI: http://auth-service:8081/internal/v1/.well-known/jwks.json
      REDIS_HOST: redis
      DB_URL: jdbc:postgresql://notification-postgres:5432/${DB_NAME:-notification}
      # Always bind to 8080 INSIDE the container. The host-side port is set
      # separately via the ports mapping below (driven by SERVER_PORT in .env).
      SERVER_PORT: "8082"
      SPRING_PROFILES_ACTIVE: docker
    # Resolve host.docker.internal to the host gateway so the container can
    # reach Auth Service's RabbitMQ on the host-published port (5671).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8082:8082"
    volumes:
      # Mount Firebase Admin SDK credentials read-only into the container.
      # Place your JSON at ./secrets/firebase-credentials.json on the host.
      - ./secrets:/app/secrets:ro
    restart: unless-stopped

volumes:
  redis-data:
  notification-postgres-data:

networks:
  notification-bridge:
    driver: bridge
  umatter-shared:
    external: true